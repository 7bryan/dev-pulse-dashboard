<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Pulse Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!--<link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />-->
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <div class="nav-brand">
          <span class="brand-icon"><i class="fa-solid fa-bold"></i></span>
          <div class="brand-text">
            <h1>DevPulse</h1>
            <p class="tagline">Manage your internet or something</p>
          </div>
        </div>

        <!--navigations link -->
        <ul class="nav-links">
          <li>
            <a href="#" class="active"
              ><i class="fa-solid fa-house"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-users"></i> Saved Profiles</a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
          </li>
        </ul>

        <!--actions and status badge -->
        <div class="nav-actions">
          <a
            href="https://github.com"
            target="_blank"
            class="github-shortcut"
            aria-label="Go to Github"
          >
            <i class="fa-brands fa-github"></i>
          </a>

          <!-- APi status badge -->
          <div id="api-status-badge" class="status-badge checking">
            <span class="status-dot"></span>
            <span id="status-text">Checking Backend Server...</span>
          </div>
        </div>
      </nav>
    </header>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
  </body>
</html>
